<!DOCTYPE html>
<html class="dark" lang="en">

<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <title>KantaBai - Projector Screen</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link
    href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
    rel="stylesheet">

  <style>
    .glass-panel {
      background: rgba(14, 21, 14, 0.45);
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      border: 1px solid rgba(255, 255, 255, 0.06);
    }

    body {
      background: #000000;
      color: #dde5d9;
      font-family: 'Plus Jakarta Sans', sans-serif;
    }

    /* Auto-hide classes for cinematic immersion */
    .auto-hide {
      transition: transform 0.8s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.8s ease;
    }
    
    .hidden-overlay-top {
      transform: translateY(-120%);
      opacity: 0;
    }

    .hidden-overlay-bottom {
      transform: translateY(120%);
      opacity: 0;
    }
  </style>

  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          "colors": {
            "primary": "#53e076",
            "background": "#000000",
            "surface-container-highest": "#2f372e",
            "on-surface": "#dde5d9",
            "on-surface-variant": "#bccbb9"
          }
        }
      }
    }
  </script>
</head>

<body class="overflow-hidden flex flex-col justify-between h-screen py-12 px-12 relative select-none">

  <!-- Video Background Element -->
  <div class="absolute inset-0 z-0 bg-black flex items-center justify-center overflow-hidden">
    <video id="video-element" class="w-full h-full object-contain" preload="auto">
      Your browser does not support the video tag.
    </video>
  </div>

  <!-- Top Overlay (Now Singing & Next in Queue) -->
  <header id="projector-header" class="w-full flex flex-col items-center gap-4 z-20 auto-hide">
    <div class="flex items-center gap-4">
      <!-- Now Singing Pill -->
      <div class="glass-panel px-8 py-4 rounded-full flex items-center gap-6 shadow-2xl border border-white/5">
        <div class="flex flex-col items-center border-r border-white/10 pr-6">
          <span class="text-[9px] font-extrabold uppercase tracking-widest text-primary/80">Now Singing</span>
          <span id="fs-singer-name" class="text-base font-extrabold text-on-surface">--</span>
        </div>
        <div class="flex items-center gap-4">
          <div class="w-10 h-10 rounded-lg bg-surface-container-highest flex items-center justify-center text-primary shadow-inner border border-white/5">
            <span class="material-symbols-outlined text-xl">music_note</span>
          </div>
          <div>
            <h1 id="fs-song-title" class="text-sm font-bold leading-none truncate max-w-[280px]">--</h1>
            <p id="fs-song-artist" class="text-[11px] text-on-surface-variant mt-1.5 leading-none truncate max-w-[240px]">--</p>
          </div>
        </div>
      </div>
    </div>

    <!-- Next in Queue Preview -->
    <div class="w-full max-w-4xl glass-panel rounded-2xl p-4 flex flex-col gap-2.5 shadow-2xl border border-white/5">
      <div class="flex justify-between items-center px-1">
        <span class="text-[10px] font-extrabold text-primary uppercase tracking-widest">Next in Queue</span>
        <div class="flex items-center gap-1.5 text-on-surface-variant">
          <span class="material-symbols-outlined text-[14px]">group</span>
          <span id="fs-queue-count" class="text-[10px] font-bold">0 songs in waitlist</span>
        </div>
      </div>
      <div class="grid grid-cols-4 gap-4" id="fs-queue-grid">
        <!-- Dynamically populated next 4 songs -->
        <div class="bg-white/5 p-3 rounded-xl flex items-center justify-center border border-white/5 text-xs text-on-surface-variant font-medium col-span-4 h-14">
          No upcoming songs in the queue
        </div>
      </div>
    </div>
  </header>

  <!-- Center Screen Display (Idle Prompt) -->
  <section class="flex-grow flex flex-col items-center justify-center w-full z-10 text-center pointer-events-none">
    <div id="fs-idle-prompt" class="text-white/10 text-4xl uppercase tracking-[1.5em] font-extrabold select-none">
      KANTA-BAI
    </div>
  </section>

  <!-- Bottom Overlay (Playback Progress slider status) -->
  <footer id="projector-footer" class="w-full flex flex-col items-center gap-6 z-20 auto-hide">
    <div class="flex items-center gap-6 bg-surface-container-highest/65 backdrop-blur-md px-8 py-3.5 rounded-full border border-white/10 shadow-xl w-full max-w-2xl justify-between">
      <div class="flex items-center gap-4 flex-grow">
        <span id="fs-time-cur" class="text-xs text-on-surface-variant font-semibold">00:00</span>
        <div class="h-1 bg-white/15 rounded-full overflow-hidden flex-grow relative">
          <div id="fs-progress-bar" class="h-full bg-primary w-0 shadow-[0_0_10px_rgba(83,224,118,0.6)]"></div>
        </div>
        <span id="fs-time-total" class="text-xs text-on-surface-variant font-semibold">00:00</span>
      </div>
    </div>
  </footer>

  <script src="projector.js"></script>
</body>

</html>
